services:
  pagila:
    image: opengauss/opengauss:latest
    container_name: pagila
    restart: unless-stopped
    environment:
      GS_PASSWORD: Enmo@123
      GS_DB: pagila
    volumes:
      - ./pagila-schema-opengauss.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./pagila-schema-jsonb-opengauss.sql:/docker-entrypoint-initdb.d/2-schema-jsonb.sql
      - ./pagila-data-opengauss.sql:/docker-entrypoint-initdb.d/3-data.sql
      - ./pagila-data-apt-jsonb.sql:/docker-entrypoint-initdb.d/4-data-apt-jsonb.sql
      - ./pagila-data-yum-jsonb.sql:/docker-entrypoint-initdb.d/5-data-yum-jsonb.sql
      - pgdata:/var/lib/opengauss/data
    ports:
      - "5432:5432"

  pgadmin:
    container_name: pgadmin4
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    volumes:
      - "./pgadmin/pgadmin_servers.json:/pgadmin4/servers.json"
      - "./pgadmin/pgadmin_pass:/pgadmin4/pass"
    ports:
      - "5050:80"
    depends_on:
      - pagila

volumes:
  pgdata:
